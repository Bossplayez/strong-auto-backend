[build]
builder = "nixpacks"
buildCommand = "rm -rf dist tsconfig.build.tsbuildinfo .env .env.* && npx prisma generate && npm run build"

[phases.install]
cmds = ["npm i --legacy-peer-deps"]

[deploy]
startCommand = "npx prisma db push --accept-data-loss --skip-generate && npm run start:prod"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[service]
internalPort = 3000
